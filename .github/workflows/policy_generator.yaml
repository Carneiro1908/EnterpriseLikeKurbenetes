name: Policy detector (iamlive)

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: The target infrastructure 
        required: true
        default: ''
        type: choice  
        options:
          - main bootstrap
          - main infra
          - env dev
          - env staging
          - env prod

      target_action:
        description: The target terraform action/command
        required: true
        default: ''
        type: choice  
        options:
          - terraform apply
          - terraform destroy

jobs:
  DetectPolicies:
    runs-on: ubuntu-latest

    if: github.actor == 'Carneiro1908'

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      AWS_REGION: eu-central-1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      # 1. Download iamlive using GitHub API directly to get the Linux AMD64 asset
      - name: Install iamlive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.iam-live
          
          # Downloads the latest release metadata and filters the asset URL for Linux AMD64
          ASSET_URL=$(gh api repos/iann0036/iam-live/releases/latest --jq '.assets[] | select(.name | ascii_downcase | contains("linux") and contains("amd64")) | .browser_download_url')
          
          echo "Downloading from: $ASSET_URL"
          curl -sL "$ASSET_URL" -o iam-live-linux.tar.gz
          
          # Extracts the binary into the destination folder
          tar -xvf iam-live-linux.tar.gz -C $HOME/.iam-live/
          chmod +x $HOME/.iam-live/*
          
          # Adds the folder to the GitHub Actions PATH
          echo "$HOME/.iam-live" >> $GITHUB_PATH

      # 2. Configure AWS Credentials with your existing OIDC Role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/iamlive-role
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # 3. Dynamically map and select the environment folder matching the input options
      - name: Select environment
        id: setdir
        run: |
          case "${{ github.event.inputs.environment }}" in
            "main bootstrap")
              echo "dir=./terraform/bootstrap/main_bootstrap" >> "$GITHUB_OUTPUT"
              ;;
            "main infra")
              echo "dir=./terraform/main_infra" >> "$GITHUB_OUTPUT"
              ;;
            "env dev")
              echo "dir=./terraform/main_infra/env/dev" >> "$GITHUB_OUTPUT"
              ;;
            "env staging")
              echo "dir=./terraform/main_infra/env/staging" >> "$GITHUB_OUTPUT"
              ;;
            "env prod")
              echo "dir=./terraform/main_infra/env/prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid environment: ${{ github.event.inputs.environment }}"
              exit 1
              ;;
          esac

      # 4. Initialize Terraform using your required S3 Backend Configuration variables
      - name: Terraform Init
        working-directory: ${{ steps.setdir.outputs.dir }}
        run: |
          terraform init \
            -backend-config="bucket=terraform-main-bootstrap-bucket-${{ env.AWS_REGION }}" \
            -backend-config="key=enviroment/bootstrap/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      # 5. Start iamlive, map Terraform execution via CSM, and save results
      - name: Run iamlive and Terraform
        working-directory: ${{ steps.setdir.outputs.dir }}
        env:
          AWS_CSM_ENABLED: "true"
          AWS_CSM_PORT: "31000"
          AWS_CSM_HOST: "127.0.0.1"
        run: |
          # Starts iamlive in background
          iamlive -mode csm -csm-port 31000 -output-file policy_output.json &
          IAMLIVE_PID=$!
          sleep 5

          echo "Starting Core Terraform Cycle..."
          
          case "${{ github.event.inputs.target_action }}" in
            "terraform apply")
              terraform plan || true
              terraform apply --auto-approve || true

              ;;
            "terraform destroy")
              terraform plan --destroy || true
              terraform destroy --auto-approve || true
              ;;
            *)
              echo "Invalid terraform command"
              exit 1
              ;;
          esac

          
          echo "Wrapping up iamlive session..."
          # Stops iamlive gracefully to ensure the JSON file is written completely
          kill -SIGINT $IAMLIVE_PID
          sleep 5

      # 6. Gather the generated JSON file from the specific environment workspace and upload it
      - name: Upload Policy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iam-policy
          path: ${{ steps.setdir.outputs.dir }}/policy_output.json