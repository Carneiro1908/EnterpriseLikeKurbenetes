name: Terraform Infrastructure CI/CD

on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: 'Run plan'
        required: true
        default: false
        type: boolean
      run_apply:
        description: 'Run apply'
        required: true
        default: false
        type: boolean
      run_plan_destroy:
        description: 'Run plan destroy'
        required: true
        default: false
        type: boolean
      run_destroy:
        description: 'Run destroy'
        required: true
        default: false
        type: boolean
      environment:
        description: "Target infraestruture environment"
        required: true 
        default: ''
        type: choice  
        options:
          - env global
          - env dev
          - env staging
          - env prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-infra
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      AWS_REGION: eu-central-1
      ROLE_NAME: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Select Environment
        id: setdir
        run: |
          case "${{ github.event.inputs.environment }}" in
            "env global")
              echo "dir=./terraform/infrastructure/global" >> "$GITHUB_OUTPUT"
              ;;
            "env dev")
              echo "dir=./terraform/infrastructure/envs/dev" >> "$GITHUB_OUTPUT"
              ;;
            "env staging")
              echo "dir=./terraform/infrastructure/envs/staging" >> "$GITHUB_OUTPUT"
              ;;
            "env prod")
              echo "dir=./terraform/infrastructure/envs/prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid environment: ${{ github.event.inputs.environment }}"
              exit 1
              ;;
          esac

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/${{env.ROLE_NAME}}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Terraform Init
        working-directory: ${{ steps.setdir.outputs.dir }}
        run: |
            terraform init \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: ${{ steps.setdir.outputs.dir }}
        run: terraform validate

      - name: DebugChecker
        working-directory: ${{ steps.setdir.outputs.dir }}
        run: |
          echo ${{ steps.setdir.outputs.dir }}; 
          ls

      - name: Terraform Plan
        working-directory: ${{ steps.setdir.outputs.dir }}
        if: ${{github.event.inputs.run_apply == 'true' || github.event.inputs.run_plan == 'true'}}
        run: terraform plan 

      - name: Terraform Apply
        working-directory: ${{ steps.setdir.outputs.dir }}
        if: ${{ github.event.inputs.run_apply == 'true' }}
        run: terraform apply -auto-approve 

      - name: Terraform Plan destroy
        working-directory: ${{ steps.setdir.outputs.dir }}
        if: ${{github.event.inputs.run_destroy == 'true' || github.event.inputs.run_plan_destroy == 'true'}}
        run: terraform plan --destroy 

      - name: Terraform Destroy
        working-directory: ${{ steps.setdir.outputs.dir }}
        if: ${{ github.event.inputs.run_destroy == 'true' }}
        run: terraform destroy -auto-approve 