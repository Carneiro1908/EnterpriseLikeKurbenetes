name: Infraestruture debbuger

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: The target infrastructure 
        required: true
        default: ''
        type: choice  
        options:
          - env global
          - env dev
          - env staging
          - env prod

jobs:
  DetectPolicies:
    runs-on: ubuntu-latest

    if: github.actor == 'Carneiro1908'

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      AWS_REGION: eu-central-1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 1.0.0

      - name: Install iamlive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.iam-live
          
          # Downloads the latest release metadata and filters the asset URL for Linux AMD64
          ASSET_URL=$(gh api repos/iann0036/iam-live/releases/latest --jq '.assets[] | select(.name | ascii_downcase | contains("linux") and contains("amd64")) | .browser_download_url')
          
          echo "Downloading from: $ASSET_URL"
          curl -sL "$ASSET_URL" -o iam-live-linux.tar.gz
          
          # Extracts the binary into the destination folder
          tar -xvf iam-live-linux.tar.gz -C $HOME/.iam-live/
          chmod +x $HOME/.iam-live/*
          
          # Adds the folder to the GitHub Actions PATH
          echo "$HOME/.iam-live" >> $GITHUB_PATH

      - name: Select environment
        id: set_env
        run: |
          case "${{ github.event.inputs.environment }}" in
            "env global")
              echo "dir=./terraform/infrastructure/global" >> "$GITHUB_OUTPUT"
              echo "bucket_name=global-infrastructure-bucket-${{secrets.ACCOUNT_ID}}" >> "$GITHUB_OUTPUT"
              echo "use_terragrunt=false" >> "$GITHUB_OUTPUT"
              ;;
            "env dev")
              echo "dir=./terraform/infrastructure/envs/dev" >> "$GITHUB_OUTPUT"
              echo "bucket_name=dev-environment-bucket-${{secrets.ACCOUNT_ID}}" >> "$GITHUB_OUTPUT"
              echo "use_terragrunt=true" >> "$GITHUB_OUTPUT"
              ;;
            "env staging")
              echo "dir=./terraform/infrastructure/envs/staging" >> "$GITHUB_OUTPUT"
              echo "bucket_name=staging-environment-bucket-${{secrets.ACCOUNT_ID}}" >> "$GITHUB_OUTPUT"
              echo "use_terragrunt=true" >> "$GITHUB_OUTPUT"
              ;;
            "env prod")
              echo "dir=./terraform/infrastructure/envs/prod" >> "$GITHUB_OUTPUT"
              echo "bucket_name=prod-environment-bucket-${{secrets.ACCOUNT_ID}}" >> "$GITHUB_OUTPUT"
              echo "use_terragrunt=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid environment: ${{ github.event.inputs.environment }}"
              exit 1
              ;;
          esac

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/infrastructure-debugger-role
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # Corrected GitHub Actions native conditional syntax
      - name: Terraform Init
        if: steps.set_env.outputs.use_terragrunt == 'false'
        working-directory: ${{ steps.set_env.outputs.dir }}
        run: |
          terraform init \
              -backend-config="bucket=${{steps.set_env.outputs.bucket_name}}"

      - name: Run iamlive and Terraform
        working-directory: ${{ steps.set_env.outputs.dir }}
        env:
          AWS_CSM_ENABLED: "true"
          AWS_CSM_PORT: "31000"
          AWS_CSM_HOST: "127.0.0.1"
          NO_PROXY: "oidc.eks.eu-central-1.amazonaws.com"   

          # Injecting step output safely as an environment variable for Bash usage
          USE_TERRAGRUNT: ${{ steps.set_env.outputs.use_terragrunt }}
        run: |
          # Runs iamlive in proxy model
          iamlive -mode proxy -output-file policy_output.json -force-wildcard-resource=false &
          IAMLIVE_PID=$!
          sleep 5

          echo "Starting Core Terraform Cycle..."

          export HTTP_PROXY=http://127.0.0.1:10080
          export HTTPS_PROXY=http://127.0.0.1:10080
          export AWS_CA_BUNDLE=$HOME/.iamlive/ca.pem

          # Corrected Bash conditional logic, spaces, and added missing 'fi' statement
          if [ "$USE_TERRAGRUNT" = "false" ]; then
            terraform apply --auto-approve 
            sleep 120
            terraform destroy --auto-approve  
          elif [ "$USE_TERRAGRUNT" = "true" ]; then 
            terragrunt run --all apply --non-interactive
            sleep 120
            terragrunt run --all destroy --non-interactive
          fi

          unset HTTP_PROXY HTTPS_PROXY AWS_CA_BUNDLE

          echo "Wrapping up iamlive session..."
          kill -SIGINT $IAMLIVE_PID
          sleep 5

      # Gather the generated JSON file from the specific environment workspace and upload it
      - name: Upload Policy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iam-policy
          path: ${{ steps.set_env.outputs.dir }}/policy_output.json