name: Infraestruture debbuger

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: The target infrastructure 
        required: true
        default: ''
        type: choice  
        options:
          - env global
          - env dev
          - env staging
          - env prod

jobs:
  DetectPolicies:
    runs-on: ubuntu-latest

    if: github.actor == 'Carneiro1908'

    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      AWS_REGION: eu-central-1

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Install iamlive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $HOME/.iam-live
          
          # Downloads the latest release metadata and filters the asset URL for Linux AMD64
          ASSET_URL=$(gh api repos/iann0036/iam-live/releases/latest --jq '.assets[] | select(.name | ascii_downcase | contains("linux") and contains("amd64")) | .browser_download_url')
          
          echo "Downloading from: $ASSET_URL"
          curl -sL "$ASSET_URL" -o iam-live-linux.tar.gz
          
          # Extracts the binary into the destination folder
          tar -xvf iam-live-linux.tar.gz -C $HOME/.iam-live/
          chmod +x $HOME/.iam-live/*
          
          # Adds the folder to the GitHub Actions PATH
          echo "$HOME/.iam-live" >> $GITHUB_PATH

      - name: Select environment
        id: setdir
        run: |
          case "${{ github.event.inputs.environment }}" in
            "env global")
              echo "dir=./terraform/infrastructure/global" >> "$GITHUB_OUTPUT"
              ;;
            "env dev")
              echo "dir=./terraform/infrastructure/envs/dev" >> "$GITHUB_OUTPUT"
              ;;
            "env staging")
              echo "dir=./terraform/infrastructure/envs/staging" >> "$GITHUB_OUTPUT"
              ;;
            "env prod")
              echo "dir=./terraform/infrastructure/envs/prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid environment: ${{ github.event.inputs.environment }}"
              exit 1
              ;;
          esac

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/infrastructure-debugger-role
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Check Identity
        run: |
          aws sts get-caller-identity --region eu-central-1
          aws s3api head-bucket --bucket global-infrastructure-bucket --region eu-central-1
          aws dynamodb describe-table --table-name global_infra_dynamo_table --region eu-central-1


      - name: Terraform Init
        working-directory: ${{ steps.setdir.outputs.dir }}
        run: |
          terraform init

      - name: Run iamlive and Terraform
        working-directory: ${{ steps.setdir.outputs.dir }}
        env:
          AWS_CSM_ENABLED: "true"
          AWS_CSM_PORT: "31000"
          AWS_CSM_HOST: "127.0.0.1"
        run: |
         # Runs iamlive in proxy model
          iamlive -mode proxy -output-file policy_output.json -force-wildcard-resource=false &
          IAMLIVE_PID=$!
          sleep 5

          echo "Starting Core Terraform Cycle..."

          export HTTP_PROXY=http://127.0.0.1:10080
          export HTTPS_PROXY=http://127.0.0.1:10080
          export AWS_CA_BUNDLE=$HOME/.iamlive/ca.pem

          # Runs terraform commands
          terraform apply --auto-approve || true
          
          sleep 120

          terraform destroy --auto-approve  || true  

          unset HTTP_PROXY HTTPS_PROXY AWS_CA_BUNDLE

          echo "Wrapping up iamlive session..."
          kill -SIGINT $IAMLIVE_PID
          sleep 5

      # 6. Gather the generated JSON file from the specific environment workspace and upload it
      - name: Upload Policy Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iam-policy
          path: ${{ steps.setdir.outputs.dir }}/policy_output.json